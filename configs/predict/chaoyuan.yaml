# YOLO Inference Configuration
# =============================
# 推理配置文件 - 潮源模型部署
# 适用任务: detect (目标检测)

# Model settings
model:
  path: ./runs/chaoyuan/20260501/weights/best.pt  # 模型路径 (.pt 或 .onnx)
  imgsz: 640                                      # 输入图像尺寸
  device: cuda                                    # 运行设备: auto, cpu, cuda, 0
  batch: 64                                       # 批次大小 (64适合16G显存)
  stream: false                                   # 流式推理模式

# Input/Output settings
io:
  input: C:\Users\maoer\Desktop\20260430任务_1                        # 输入路径 (图片/目录/视频)
  output: runs/predict                            # 输出目录
  save_vis: true                                  # 保存可视化结果
  save_json: false                                # 保存JSON结果
  save_txt: true                                  # 保存YOLO格式标签

# NMS (Non-Maximum Suppression) settings
nms:
  conf: 0.7                                       # 置信度阈值
  iou: 0.7                                        # NMS IoU阈值
  max_det: 100                                    # 最大检测数
  agnostic_nms: true                              # 类别无关NMS

# Visualization settings
visualization:
  box_thickness: 2                                # 框线粗细
  font_scale: 0.5                                 # 字体大小
  show_labels: true                               # 显示类别标签
  show_conf: true                                 # 显示置信度

# Video settings (仅视频输入时生效)
video:
  codec: mp4v                                     # 视频编码器

# Other settings
verbose: true                                     # 详细输出
