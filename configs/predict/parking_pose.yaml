# YOLO Inference Configuration
# =============================
# Configuration for batch inference

# Model settings
model:
  path: /media/yun/de2a43ce-446c-4a62-99b3-8ddc6ea1ef87/yolo-project/runs/parking_spot/weights/best.pt  # Model path (.pt or .onnx)
  format: auto     # auto, pytorch, onnx
  imgsz: 640       # Input image size
  device: auto     # auto, cpu, cuda, 0, 0,1
  classes: [0]     # Only keep specified classes (null = all). COCO: person=0, car=2, etc.

# Input/Output settings
io:
  input: /media/yun/706bc403-c76c-4fdd-8a3f-d954b6189048/实习/停车泊位昆明/           # Input image or directory
  output: runs/predict   # Output directory
  save_vis: true           # Save visualization images
  save_json: false         # Save detection results as JSON
  save_txt: true           # Save YOLO format txt labels
  save_crop: false         # Save cropped detection images

# NMS (Non-Maximum Suppression) settings
nms:
  conf: 0.35        # Confidence threshold
  iou: 0.4          # NMS IoU threshold
  max_det: 300      # Maximum detections per image
  agnostic_nms: true    # Class-agnostic NMS

# Visualization settings
visualization:
  box_thickness: 2  # Bounding box line thickness
  font_scale: 0.5   # Font scale for labels
  show_labels: true # Show class labels  # 显示类别标签 (前端可视化)
  show_conf: true   # Show confidence scores
  # Skeleton connections for pose keypoints (closed loop: 0→1→2→3→0)
  # Parking spot 4-keypoint order: front_left, front_right, rear_right, rear_left
  skeleton: [[0, 1], [1, 2], [2, 3], [3, 0]]  # 关键点连接关系列表 [[i,j], ...] (pose 任务专用)
  kpt_names:
    0: ["front_left", "front_right", "rear_right", "rear_left"]

# Other settings
verbose: true
