# YOLO OBB (Oriented Bounding Box) Inference Configuration - Example
# ===================================================================
# 旋转框检测推理配置示例
# 适用于: 航拍/卫星图像、倾斜目标检测、任意方向物体

# Model settings
model:
  path: "runs/obb/train/weights/best.pt"        # 模型路径 (.pt 或 .onnx 格式)
  format: auto                                  # 模型格式: auto=自动检测, pytorch=PyTorch, onnx=ONNX
  imgsz: 1024                                   # 输入图像尺寸 (1024=OBB推荐大尺寸, 640=快但精度降)
  device: auto                                  # 运行设备: auto=自动, cpu=CPU, cuda=GPU, 0=指定GPU
  batch: 1                                      # 批次大小 (OBB内存占用大, 建议batch=1)
  classes: null                                 # 类别过滤 (null=全部类别, [0,2]=指定类别)
  stream: false                                 # 流式推理模式 (航拍大图必开省内存)
  half: false                                   # FP16半精度 (提速2x+, OBB推荐开启但需验证精度)
  augment: false                                # TTA测试时增强 (精度提升但更慢, 正式提交时考虑)
  vid_stride: 1                                 # 视频帧间隔 (1=每帧处理, 5=每5帧处理1帧)
  int8: false                                   # INT8量化推理 (最快, 边缘设备适用, 精度略降)
  visualize: false                              # 可视化模型中间特征 (调试/教学用, 正常推理关闭)
  embed: null                                   # 提取特征嵌入 (用于下游任务)

# Input/Output settings
io:
  input: "datasets/test/images"                 # 输入路径 (图片/目录/视频/URL)
  output: "runs/inference/obb"                  # 输出目录 (默认相对路径)
  save_vis: true                                # 保存可视化结果 (带旋转框的图片)
  save_json: false                              # 保存JSON格式结果 (包含旋转框坐标)
  save_txt: true                                # 保存YOLO OBB格式txt (带角度/多边形)
  save_crop: false                              # 保存裁剪的目标图片 (带旋转裁剪)
  save_frames: false                            # 保存视频帧为单独图片

# NMS (Non-Maximum Suppression) settings
nms:
  conf: 0.25                                    # 置信度阈值 (0.25=只保留>25%的检测)
  iou: 0.7                                      # NMS IoU阈值 (0.7=IoU>0.7合并为同一目标)
  max_det: 300                                  # 最大检测数 (每图最多输出300个框)
  agnostic: false                               # 类别无关NMS (true=同类/不同类都合并)

# OBB specific settings
obb:
  angle_version: "le90"                         # 角度范围: "le90" (-90到90度, 推荐) 或 "oc" (0到180度)
  angle_thres: 0.1                              # 角度差异阈值 (弧度, 用于合并相似角度的框)
  output_format: "poly"                         # 输出格式: "poly" (多边形4点, 推荐) 或 "rect" (中心+宽高+角度)
  min_ratio: 0.1                                # 最小宽高比 (过滤太细长的目标)
  max_ratio: 10.0                               # 最大宽高比 (过滤太扁的目标)

# Visualization settings
visualization:
  box_thickness: 2                              # 框线粗细 (像素值, 建议2-3)
  font_scale: 0.5                               # 字体大小 (0.5=适中, 大图可调大)
  show_labels: true                             # 显示类别标签
  show_conf: true                               # 显示置信度值
  show_boxes: true                              # 显示旋转边界框 (OBB必开)
  line_width: null                              # 框线宽度 (null=自动计算)

# Video settings
video:
  fps: null                                     # 输出视频FPS (null=保持原FPS)
  codec: "mp4v"                                 # 视频编码器 (mp4v=兼容性好, xvid/h264=质量高)
  stream_buffer: false                          # 流缓冲 (false=保留最新帧)

# Other settings
verbose: true                                   # 详细输出 (true=显示处理进度信息)
