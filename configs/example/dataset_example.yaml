# Example Dataset Configuration
# ==============================
# Custom dataset configuration for YOLO training

# Dataset path (relative to project root or absolute path)
# Options:
#   1. Relative path: ../datasets/example_dataset
#   2. Absolute path: /path/to/datasets/example_dataset
#   3. Dataset name (auto-download): coco8
path: ../datasets/example_dataset

# Image paths (relative to 'path')
train: images/train  # training images
val: images/val      # validation images
test: images/test    # test images (optional)

# Classes - IMPORTANT: class_id must start from 0 and be continuous
# The number of classes must match your label files
names:
  0: person
  1: car
  2: dog
  3: cat
  4: bicycle

# Optional: Download script/URL for auto-download
# download: https://example.com/dataset.zip
