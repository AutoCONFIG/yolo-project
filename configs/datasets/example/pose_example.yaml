# Pose Dataset Configuration
# ==========================
# 姿态估计数据集配置示例
# 适用任务: pose (姿态估计)
# 数据集格式: YOLO格式 (images/ + labels/)

# 数据集根路径
path: ../datasets/pose_example                   # 数据集根目录路径 (相对路径或绝对路径)

# 图像路径 (相对于 path)
train: images/train                              # 训练集图像目录 (相对于path)
val: images/val                                  # 验证集图像目录 (相对于path)
test: images/test                                # 测试集图像目录 (可选, 相对于path)

# 姿态估计关键点配置
kpt_shape: [17, 3]                               # 17个关键点，每个3维 (x, y, visibility)
# flip_idx: 水平翻转时关键点的左右对应关系
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]

# 类别名称映射 (class_id: class_name)
# 姿态估计通常只有一个类别 (person)
names:                                           # 类别名称映射 {class_id: class_name}
  0: person                                      # 0=人

# 可选: 自动下载数据集的URL或脚本
# download: https://example.com/pose_dataset.zip  # 下载数据集 (支持URL或脚本)
