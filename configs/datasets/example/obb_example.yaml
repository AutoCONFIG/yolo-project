# OBB Dataset Configuration
# ==========================
# 旋转框目标检测数据集配置示例
# 适用任务: obb (旋转框检测)
# 数据集格式: YOLO格式 (images/ + labels/)

# 数据集根路径
path: ../datasets/obb_example                    # 数据集根目录路径 (相对路径或绝对路径)

# 图像路径 (相对于 path)
train: images/train                              # 训练集图像目录 (相对于path)
val: images/val                                  # 验证集图像目录 (相对于path)
test: images/test                                # 测试集图像目录 (可选, 相对于path)

# 类别名称映射 (class_id: class_name)
# 航拍/卫星图像常见类别
names:                                           # 类别名称映射 {class_id: class_name}
  0: plane                                       # 0=飞机
  1: ship                                        # 1=船只
  2: storage tank                                # 2=储油罐
  3: vehicle                                     # 3=车辆

# 可选: 自动下载数据集的URL或脚本
# download: https://example.com/obb_dataset.zip  # 下载数据集 (支持URL或脚本)
