# Example Detection Dataset Configuration
# =========================================
# 目标检测数据集配置示例
# 适用任务: detect (目标检测)
# 数据集格式: YOLO格式 (images/ + labels/)

# 数据集根路径 (相对路径或绝对路径)
# 三种写法:
#   1. 相对路径: ../datasets/example_dataset
#   2. 绝对路径: /path/to/datasets/example_dataset
#   3. 数据集名称 (自动下载): coco8, coco128, voc 等
path: ../datasets/example_dataset               # 数据集根目录路径 (相对路径或绝对路径)

# 图像路径 (相对于 path)
train: images/train                             # 训练集图像目录 (相对于path)
val: images/val                                 # 验证集图像目录 (相对于path)
test: images/test                               # 测试集图像目录 (可选, 相对于path)

# 类别名称映射 (class_id: class_name)
# 重要: class_id 必须从 0 开始连续编号, 且与标签文件一致
# 类别数量必须与标签文件中的最大class_id + 1 匹配
names:  # 类别名称映射 {class_id: class_name}
  0: person                                     # 0=行人
  1: car                                        # 1=汽车
  2: dog                                        # 2=狗
  3: cat                                        # 3=猫
  4: bicycle                                    # 4=自行车

# 可选: 自动下载数据集的URL或脚本
# download: https://example.com/dataset.zip     # 下载数据集 (支持URL或脚本)
