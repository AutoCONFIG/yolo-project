# Classification Dataset Configuration
# =====================================
# 图像分类数据集配置示例
# 适用任务: classify (图像分类)
# 数据集格式: ImageFolder格式 (按类别分子目录)

# 数据集根路径
path: ../datasets/classify_example               # 数据集根目录路径 (相对路径或绝对路径)

# 图像路径 (ImageFolder格式)
train: train                                     # 训练集子目录 (相对于path)
val: val                                         # 验证集子目录 (相对于path)
test:                                            # 测试集子目录 (可选, 相对于path)

# 类别名称映射 (class_id: class_name)
# 重要: class_id 必须从 0 开始连续编号, 且与ImageFolder目录顺序一致
names:
  0: cat                                         # 0=猫类
  1: dog                                         # 1=狗类
  2: bird                                        # 2=鸟类

# 可选: 自动下载数据集的URL或脚本
# download: https://example.com/classify_dataset.zip  # 下载数据集 (支持URL或脚本)
