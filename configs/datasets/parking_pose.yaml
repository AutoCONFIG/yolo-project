# Parking Spot Pose Dataset Configuration
# =======================================
# 停车位关键点检测数据集
# 适用任务: pose

path: /media/yun/de2a43ce-446c-4a62-99b3-8ddc6ea1ef87/datasets/parking_pose  # 数据集根目录路径 (相对路径或绝对路径)

train: images/train
val: images/val  # 验证集图像目录 (相对于path)

# 关键点形状: [数量, 维度(3=x,y,visibility)]
kpt_shape: [4, 3]
# 水平翻转时的关键点索引映射
flip_idx: [1, 0, 3, 2]

names:  # 类别名称映射 {class_id: class_name}
  0: parking_spot

kpt_names:
  0: [front_left, front_right, rear_right, rear_left]
