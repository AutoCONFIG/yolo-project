# YOLO Detection Training Configuration - Chaoyuan
# =================================================
# 车辆/行人/车窗检测任务 - YOLO26n 从头训练
# 硬件: 16G 显存, 单 HDD

model:
  name: yolo26n.yaml                          # .yaml 从头建网络, .pt 加载预训练权重
  pretrained: false                           # False=从头训练, True/路径=加载权重
  task: detect                                # detect/segment/classify/pose/obb

data:
  config: configs/datasets/chaoyuan.yaml      # 数据集配置文件路径
  split: val                                  # 验证集划分名称

train:
  epochs: 500                                 # 总训练轮数 (早停会提前结束)
  batch: 52                                   # 每批次图像数 (16G 显存建议 32-64)
  imgsz: 640                                  # 输入图像尺寸
  device: null                                # null=自动, "0"=第一块GPU, "0,1"=多卡
  workers: 4                                  # 数据加载进程 (单 HDD 建议 1-2)
  resume: true                                # true=从 last.pt 恢复训练
  patience: 50                                # 早停耐心值
  cache: disk                                 # ram/disk/False
  save: true                                  # 是否保存训练权重
  amp: true                                   # 自动混合精度训练
  rect: false                                 # 矩形训练
  single_cls: false                           # 单类别模式
  fraction: 1.0                               # 使用数据集比例
  freeze:                                     # 冻结层数 (如 10)
  multi_scale: 0.3                            # 多尺度训练 (0.3=±30%)
  compile: false                               # PyTorch 编译优化
  end2end: true                               # YOLO26 端到端检测
  nbs: 52                                     # 名义批次大小

  optimizer: AdamW                             # SGD/Adam/AdamW/auto
  lr0: 0.001                                  # 初始学习率 (Adam=0.001, SGD=0.01)
  # 余弦学习率退火

  warmup_epochs: 3.0                           # 预热轮数
  warmup_momentum: 0.8                        # 预热动量
  warmup_bias_lr: 0.1                         # 预热偏置学习率

  box: 8.5                                     # 边界框损失权重
  cls: 0.5                                    # 分类损失权重
  cls_pw: 0.0                                 # 类别权重幂次
  dfl: 1.5                                    # 分布焦点损失权重

  close_mosaic: 100                           # 最后 N 轮关闭 Mosaic
  seed: 0                                     # 随机种子
  deterministic: true                          # 确定性模式

augmentation:
  hsv_h: 0.015                                # HSV 色调增强
  hsv_s: 0.7                                  # HSV 饱和度增强
  hsv_v: 0.4                                  # HSV 亮度增强
  degrees: 5.0                                # 旋转角度
  translate: 0.15                             # 平移比例
  scale: 0.5                                  # 缩放范围
  shear: 3.0                                   # 剪切角度
  perspective: 0.0                            # 透视变换
  flipud: 0.0                                  # 垂直翻转概率
  fliplr: 0.5                                 # 水平翻转概率
  bgr: 0.0                                    # BGR 通道交换概率
  mosaic: 1.0                                  # Mosaic 增强概率
  mixup: 0.05                                 # MixUp 增强概率
  cutmix: 0.0                                  # CutMix 增强概率
  copy_paste: 0.0                             # 复制粘贴增强

validation:
  val: true                                   # 是否进行验证
  conf: 0.25                                  # 置信度阈值
  iou: 0.7                                    # NMS IoU 阈值
  max_det: 300                                # 最大检测数
  half: false                                 # FP16 半精度验证
  plots: true                                 # 生成验证可视化图
  save_json: false                             # 保存 COCO 格式 JSON
  dnn: false                                  # OpenCV DNN 推理
  agnostic_nms: false                         # 类别无关 NMS
  augment: false                              # 测试时增强 TTA

output:
  project: runs/chaoyuan                   # 结果保存目录
  name: 20260501                              # 实验名称
  save_period: -1                            # 每 N 轮保存权重
  exist_ok: true                              # 覆盖已有目录
  verbose: true                               # 详细日志
