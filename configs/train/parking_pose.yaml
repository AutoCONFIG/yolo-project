# YOLO Pose Training Configuration - Parking Spot
# =================================================

mode: train

# Model: 使用预训练 pose 模型微调（自动适配 nc 和 kpt_shape）
model:
  name: yolo26n-pose.pt

# Data
data:
  config: configs/datasets/parking_pose.yaml
  split: val

# Training
train:
  epochs: 100
  batch: 16
  imgsz: 640
  device: null
  workers: 8
  resume: false

  # Optimizer
  optimizer: auto
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # Warmup
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  cos_lr: false

# Augmentation
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.4
  cutmix: 0.0

# Validation
validation:
  conf: 0.25
  iou: 0.7
  val: true
  plots: true
  save_json: false

# Output
output:
  project: runs/pose
  name: parking_spot
  save_period: -1
  exist_ok: false
  verbose: true
