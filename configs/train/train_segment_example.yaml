# YOLO Segmentation Training Configuration
# =========================================
# Instance segmentation training example.
# Labels must be in YOLO segmentation format: <class> <x1> <y1> <x2> <y2> ... <xn> <yn>

mode: train

model:
  name: yolo26n-seg.yaml
  pretrained: True
  task: segment

data:
  config: configs/datasets/segment_example.yaml
  split: val

train:
  epochs: 100
  time:
  batch: 16
  imgsz: 640
  device:
  workers: 8
  resume: false
  patience: 100
  cache: false
  save: true
  amp: true
  rect: false
  single_cls: false
  fraction: 1.0
  freeze:
  multi_scale: 0.0
  compile: false
  end2end:
  nbs: 64
  profile: false

  optimizer: auto
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cos_lr: false

  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  box: 7.5
  cls: 0.5
  cls_pw: 0.0
  dfl: 1.5

  close_mosaic: 10
  seed: 0
  deterministic: true

  dropout: 0.0
  overlap_mask: true
  mask_ratio: 4

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  bgr: 0.0
  mosaic: 1.0
  mixup: 0.0
  cutmix: 0.0
  copy_paste: 0.0
  copy_paste_mode: flip
  auto_augment: randaugment
  erasing: 0.4

validation:
  val: true
  conf: 0.25
  iou: 0.7
  max_det: 300
  half: false
  plots: true
  save_json: false
  dnn: false
  agnostic_nms: false
  augment: false

cfg:
tracker: botsort.yaml

output:
  project:
  name: segment_example
  save_period: -1
  exist_ok: false
  verbose: true
