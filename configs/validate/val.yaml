# YOLO Validation Configuration
# =============================
# 模型验证/评估配置

model:
  name: yolo26n.pt      # 模型名称或权重路径
  task: null             # 任务类型: null=自动, detect/segment/classify/pose/obb
  imgsz: 640             # 输入图像尺寸 (默认 640, 分类建议 224)
  batch: 16              # 批次大小 (推理默认 1, 训练默认 16)
  device: null           # 计算设备: null=自动, cpu, 0, 0,1 等
  classes: null          # 类别过滤 (null=全部, [0,1]=只保留指定类别)

data:
  config: coco8.yaml    # 数据集配置文件路径
  split: val             # 数据集划分: train/val/test

validation:
  conf: 0.25             # 置信度阈值 (val 默认 0.001, predict 默认 0.25)
  iou: 0.7               # NMS IoU 阈值 (默认 0.7, 越大保留越多框)
  max_det: 300           # 每图最大检测数 (默认 300)
  half: false            # FP16 半精度验证
  plots: true            # 生成验证图表 (PR曲线/混淆矩阵/F1曲线等)
  save_json: false       # 保存 COCO 格式 JSON 结果 (用于官方评估工具)
  save_conf: false       # 在 txt 标签中保存置信度分数
  dnn: false             # 使用 OpenCV DNN 进行 ONNX 推理验证
  agnostic_nms: false    # 类别无关 NMS (不同类别框也做 NMS)
  augment: false         # 测试时增强 TTA (慢但可能提升精度)
  rect: false            # 矩形验证 (减少 padding, 加速但可能略降精度)
  int8: false            # INT8 量化推理验证
  end2end: null          # 端到端检测头验证 (YOLO26/YOLOv10)
  save_txt: false        # 保存 txt 标签
  save_crop: false       # 保存裁剪检测
  show: false            # 显示验证结果
  line_width: null       # 线宽 (null=自动)
  show_labels: true      # 显示类别标签
  show_conf: true        # 显示置信度
  show_boxes: true       # 显示检测框

output:
  project: null          # 结果保存根目录 (null=默认 runs/)
  name: null             # 实验名称 (null=自动命名)
  save_period: -1        # 每 N 轮保存检查点 (-1=只保存 best/last)
  exist_ok: false        # 是否覆盖已有目录 (true=覆盖, false=自动递增名称)
  verbose: true          # 详细日志输出
