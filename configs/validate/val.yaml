# YOLO Validation Configuration
# ==============================
# Validation mode configuration file

mode: val

# Model settings
model:
  name: yolo26n.pt  # Or path to trained model: runs/detect/train/weights/best.pt

# Data settings
data:
  config: coco8.yaml
  split: val  # val, test, train

# Validation settings
train:
  imgsz: 640
  batch: 16
  device: null  # auto

validation:
  conf: 0.25
  iou: 0.7
  plots: true
  save_json: false
  dnn: false
  agnostic_nms: false
  classes: null  # e.g. [0, 1] for specific classes
  augment: false
  half: false
  max_det: 300

output:
  verbose: true

# Misc
cfg:
tracker: botsort.yaml
