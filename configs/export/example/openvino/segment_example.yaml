# OpenVINO Segmentation Export Configuration - Example
# ================================================================
# 实例分割模型 OpenVINO 导出配置示例

model:
  path: runs/segment/train/weights/best.pt             # 分割模型路径
  format: openvino                                     # 导出格式: openvino
  imgsz: 640                                           # 输入尺寸 (与训练一致)
  batch: 1                                             # 批次大小
  device: cpu                                          # Intel CPU推荐

export:
  half: true                                           # FP16 (分割模型推荐开启, 减半模型大小)
  dynamic: false                                       # 动态尺寸 (分割模型建议固定尺寸)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (分割模型不适用)
  int8: false                                          # INT8量化 (分割模型量化精度损失较大)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (OpenVINO不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null