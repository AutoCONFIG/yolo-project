# OpenVINO Pose Export Configuration - Example
# ================================================================
# 姿态估计模型 OpenVINO 导出配置示例

model:
  path: runs/pose/train/weights/best.pt                # 姿态模型路径
  format: openvino                                     # 导出格式: openvino
  imgsz: 640                                           # 输入尺寸 (与训练一致)
  batch: 1                                             # 批次大小
  device: cpu                                          # Intel CPU推荐

export:
  half: true                                           # FP16 (姿态模型推荐开启)
  dynamic: false                                       # 动态尺寸 (建议固定尺寸)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (按需开启)
  int8: false                                          # INT8量化 (姿态关键点精度敏感, 谨慎使用)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (OpenVINO不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null