# OpenVINO Classification Export Configuration - Example
# ================================================================
# 分类模型 OpenVINO 导出配置示例
# OpenVINO + Intel CPU 是分类部署的最佳组合之一

model:
  path: runs/classify/train/weights/best.pt            # 分类模型路径
  format: openvino                                     # 导出格式: openvino
  imgsz: 224                                           # 分类输入尺寸 (通常224)
  batch: 1                                             # 批次大小
  device: cpu                                          # Intel CPU推荐

export:
  half: true                                           # FP16 (分类推荐开启, 几乎无损)
  dynamic: false                                       # 动态尺寸 (分类通常固定224)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (分类不需要)
  int8: true                                           # INT8量化 (分类推荐开启, 精度影响极小)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (OpenVINO不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null