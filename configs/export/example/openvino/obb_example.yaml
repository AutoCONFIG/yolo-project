# OpenVINO OBB Export Configuration - Example
# ================================================================
# 旋转框检测模型 OpenVINO 导出配置示例
# 适合在 Intel CPU 上部署航拍/卫星图旋转框检测

model:
  path: runs/obb/train/weights/best.pt                 # OBB模型路径
  format: openvino                                     # 导出格式: openvino
  imgsz: 1024                                          # 输入尺寸 (OBB常用1024)
  batch: 1                                             # 批次大小
  device: cpu                                          # Intel CPU推荐

export:
  half: true                                           # FP16 (OBB推荐开启)
  dynamic: false                                       # 动态尺寸 (建议固定尺寸)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (OBB推荐关闭)
  int8: false                                          # INT8量化 (可按需开启)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (OpenVINO不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null