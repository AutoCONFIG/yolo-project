# ONNX OBB Export Configuration - Example
# ================================================================
# 旋转框检测模型 ONNX 导出配置示例
# 注意: OBB 模型输出包含旋转角度, 需要专用后处理解码

model:
  path: runs/obb/train/weights/best.pt                 # OBB模型路径 (注意 obb 目录)
  format: onnx                                         # 导出格式: onnx
  imgsz: 1024                                          # 输入尺寸 (OBB常用1024, 航拍/卫星图目标小)
  batch: 1                                             # 批次大小
  device: auto                                         # 计算设备

export:
  half: true                                           # FP16 (OBB推荐开启, 旋转框对精度不太敏感)
  dynamic: true                                        # 动态尺寸 (推荐开启, OBB通常大图)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (OBB推荐关闭, 后处理需旋转框解码)
  int8: false                                          # INT8量化 (可按需开启)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (ONNX不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null