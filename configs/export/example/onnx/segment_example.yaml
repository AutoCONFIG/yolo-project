# ONNX Segmentation Export Configuration - Example
# ================================================================
# 实例分割模型 ONNX 导出配置示例
# 注意: 分割模型输出包含掩码, 导出时注意动态尺寸设置

model:
  path: runs/segment/train/weights/best.pt             # 分割模型路径 (注意 segment 目录)
  format: onnx                                         # 导出格式: onnx
  imgsz: 640                                           # 输入尺寸 (与训练一致)
  batch: 1                                             # 批次大小
  device: auto                                         # 计算设备

export:
  half: false                                          # FP16 (分割模型较大, FP16可减半显存但需GPU推理)
  dynamic: true                                        # 动态尺寸 (分割推荐开, 支持不同分辨率输入)
  simplify: true                                       # ONNX图简化 (推荐开启)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (分割模型通常关闭)
  int8: false                                          # INT8量化 (分割模型量化精度损失较大, 谨慎使用)
  fraction: 1.0                                        # 校准数据集比例
  keras: false                                         # Keras导出 (ONNX不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null