# TorchScript Segmentation Export Configuration - Example
# ================================================================
# 实例分割模型 TorchScript 导出配置示例
# 注意: 分割模型的掩码输出在 TorchScript 中可能需要特殊后处理

model:
  path: runs/segment/train/weights/best.pt             # 分割模型路径
  format: torchscript                                  # 导出格式: torchscript
  imgsz: 640                                           # 输入尺寸
  batch: 1                                             # 批次大小
  device: cpu                                          # CPU推荐

export:
  half: false                                          # FP16 (CPU必须false)
  dynamic: false                                        # 动态尺寸 (TorchScript动态支持有限)
  simplify: false                                      # ONNX图简化 (TorchScript不需要)
  opset: null                                          # opset版本 (不适用)
  nms: false                                           # 嵌入NMS (分割模型通常关闭)
  int8: false                                          # INT8量化 (TorchScript不支持INT8)
  optimize: false                                      # 移动端优化 (移动端部署可开启)
  fraction: 1.0                                        # 校准比例 (不适用)
  keras: false                                         # Keras导出 (TorchScript不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null