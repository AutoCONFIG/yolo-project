# TorchScript OBB Export Configuration - Example
# ================================================================
# 旋转框检测模型 TorchScript 导出配置示例
# 适用场景: LibTorch C++ 集成, 边缘设备旋转框检测

model:
  path: runs/obb/train/weights/best.pt                 # OBB模型路径
  format: torchscript                                  # 导出格式: torchscript
  imgsz: 1024                                          # 输入尺寸 (OBB常用1024)
  batch: 1                                             # 批次大小
  device: cpu                                          # CPU推荐

export:
  half: false                                          # FP16 (CPU必须false, GPU可true)
  dynamic: false                                        # 动态尺寸 (TorchScript动态支持有限)
  simplify: false                                      # ONNX图简化 (TorchScript不需要)
  opset: null                                          # opset版本 (不适用)
  nms: false                                           # 嵌入NMS (OBB推荐关闭)
  int8: false                                          # INT8量化 (TorchScript不支持)
  optimize: false                                      # 移动端优化 (按需开启)
  fraction: 1.0                                        # 校准比例 (不适用)
  keras: false                                         # Keras导出 (TorchScript不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null