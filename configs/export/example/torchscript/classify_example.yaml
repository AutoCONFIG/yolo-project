# TorchScript Classification Export Configuration - Example
# ================================================================
# 分类模型 TorchScript 导出配置示例
# 分类模型体积小, 适合 LibTorch C++ 移动端部署

model:
  path: runs/classify/train/weights/best.pt            # 分类模型路径
  format: torchscript                                  # 导出格式: torchscript
  imgsz: 224                                           # 分类输入尺寸 (通常224)
  batch: 1                                             # 批次大小
  device: cpu                                          # CPU推荐

export:
  half: false                                          # FP16 (CPU必须false, GPU可true)
  dynamic: false                                        # 动态尺寸 (TorchScript动态支持有限)
  simplify: false                                      # ONNX图简化 (TorchScript不需要)
  opset: null                                          # opset版本 (不适用)
  nms: false                                           # 嵌入NMS (分类不需要)
  int8: false                                          # INT8量化 (TorchScript不支持INT8)
  optimize: true                                       # 移动端优化 (分类部署推荐开启)
  fraction: 1.0                                        # 校准比例 (不适用)
  keras: false                                         # Keras导出 (TorchScript不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null