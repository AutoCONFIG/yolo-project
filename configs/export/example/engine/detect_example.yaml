# TensorRT Detection Export Configuration - Example
# ================================================================
# 目标检测模型 TensorRT (engine) 导出配置示例
# 注意: 导出必须在 NVIDIA GPU 上进行, 目标机器需要同架构 GPU

model:
  path: runs/detect/train/weights/best.pt              # 检测模型路径
  format: engine                                       # 导出格式: engine (TensorRT)
  imgsz: 640                                           # 输入尺寸 (与训练一致)
  batch: 1                                             # 批次大小
  device: 0                                            # 必须指定GPU (0=第一块; CPU不支持TensorRT)

export:
  half: true                                           # FP16 (检测强烈推荐, 速度2x且显存减半, 精度损失极小)
  dynamic: false                                       # 动态尺寸 (检测通常固定尺寸更快)
  simplify: true                                       # ONNX图简化 (推荐先简化ONNX再转TensorRT)
  opset: null                                          # opset版本 (null=自动, TensorRT通常用17)
  nms: false                                           # 嵌入NMS (可开启实现端到端推理)
  int8: false                                          # INT8量化 (可开启但需校准数据集, 精度损失较大)
  fraction: 1.0                                        # INT8校准数据集比例 (1.0=全部, 0.1=只用10%快速校准)
  workspace: 4                                          # TensorRT工作空间 (GB, 4=默认; 大模型建议8-16)
  keras: false                                         # Keras导出 (TensorRT不使用)

output:
  path: null                                           # 输出路径 (null=自动生成)
  verbose: true                                        # 详细输出 (true=显示TensorRT层优化日志)

verify:
  enabled: true                                        # 导出后验证 (推荐开启, 必须在同GPU上验证)
  source: null