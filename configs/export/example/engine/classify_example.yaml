# TensorRT Classification Export Configuration - Example
# ================================================================
# 分类模型 TensorRT (engine) 导出配置示例
# 分类模型体积小, 非常适合 INT8 量化加速

model:
  path: runs/classify/train/weights/best.pt            # 分类模型路径
  format: engine                                       # 导出格式: engine (TensorRT)
  imgsz: 224                                           # 分类输入尺寸 (通常224)
  batch: 1                                             # 批次大小 (分类可加大, 显存占用小)
  device: 0                                            # 必须指定GPU

export:
  half: true                                           # FP16 (分类推荐开启, 几乎无损)
  dynamic: false                                       # 动态尺寸 (分类通常固定224)
  simplify: true                                       # ONNX图简化 (推荐)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (分类不需要NMS)
  int8: true                                           # INT8量化 (分类模型强烈推荐, 精度影响极小)
  fraction: 1.0                                        # 校准数据集比例
  workspace: 4                                          # 工作空间 (GB, 分类模型小, 4GB足够)
  keras: false                                         # Keras导出 (TensorRT不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null