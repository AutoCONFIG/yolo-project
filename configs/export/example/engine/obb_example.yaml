# TensorRT OBB Export Configuration - Example
# ================================================================
# 旋转框检测模型 TensorRT (engine) 导出配置示例
# OBB 模型在航拍/卫星图场景需要大图输入, 注意显存

model:
  path: runs/obb/train/weights/best.pt                 # OBB模型路径
  format: engine                                       # 导出格式: engine (TensorRT)
  imgsz: 1024                                          # 输入尺寸 (OBB常用1024)
  batch: 1                                             # 批次大小 (OBB大图, batch=1比较安全)
  device: 0                                            # 必须指定GPU

export:
  half: true                                           # FP16 (OBB推荐开启, 大图特别需要省显存)
  dynamic: false                                       # 动态尺寸 (建议固定, 大图动态不好控制)
  simplify: true                                       # ONNX图简化 (推荐)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (OBB推荐关闭)
  int8: false                                          # INT8量化 (可按需开启)
  fraction: 1.0                                        # 校准数据集比例
  workspace: 8                                          # 工作空间 (GB, OBB大图需要8-16)
  keras: false                                         # Keras导出 (TensorRT不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null