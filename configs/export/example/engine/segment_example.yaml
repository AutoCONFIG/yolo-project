# TensorRT Segmentation Export Configuration - Example
# ================================================================
# 实例分割模型 TensorRT (engine) 导出配置示例
# 注意: 分割模型比检测模型大, 工作空间建议8GB+

model:
  path: runs/segment/train/weights/best.pt             # 分割模型路径
  format: engine                                       # 导出格式: engine (TensorRT)
  imgsz: 640                                           # 输入尺寸 (与训练一致)
  batch: 1                                             # 批次大小
  device: 0                                            # 必须指定GPU

export:
  half: true                                           # FP16 (分割模型强烈推荐, 大幅减显存)
  dynamic: false                                       # 动态尺寸 (分割模型动态支持有限)
  simplify: true                                       # ONNX图简化 (推荐先简化ONNX再转TRT)
  opset: null                                          # opset版本 (null=自动)
  nms: false                                           # 嵌入NMS (分割模型通常关闭)
  int8: false                                          # INT8量化 (分割精度损失大, 谨慎使用)
  fraction: 1.0                                        # 校准数据集比例
  workspace: 8                                          # 工作空间 (GB, 分割模型建议8+, 掩码需要更多显存)
  keras: false                                         # Keras导出 (TensorRT不使用)

output:
  path: null
  verbose: true

verify:
  enabled: true
  source: null