# ONNX Export Configuration
# =========================
# Export YOLO model to ONNX format for cross-platform deployment.

# Model settings
model:
  path: runs/detect/train/weights/best.pt
  format: onnx
  imgsz: 640
  batch: 1
  device: auto

# Export options
export:
  half: false
  dynamic: false
  simplify: true
  opset: null
  nms: false
  int8: false

# Output settings
output:
  path: null
  verbose: true

# Verification (optional)
verify:
  enabled: false
  source: null
