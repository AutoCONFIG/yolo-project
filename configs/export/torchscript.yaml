# TorchScript Export Configuration
# =================================
# Export YOLO model to TorchScript format for PyTorch-native deployment.

# Model settings
model:
  path: runs/detect/train/weights/best.pt
  format: torchscript
  imgsz: 640
  batch: 1
  device: cpu

# Export options
export:
  half: false
  dynamic: false
  simplify: false
  opset: null
  nms: false
  int8: false

# Output settings
output:
  path: null
  verbose: true

# Verification (optional)
verify:
  enabled: false
  source: null
