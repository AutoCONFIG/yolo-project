# TensorRT Engine Export Configuration
# =====================================
# Export YOLO model to TensorRT engine format for NVIDIA GPU inference.

# Model settings
model:
  path: runs/detect/train/weights/best.pt
  format: engine
  imgsz: 640
  batch: 1
  device: 0

# Export options
export:
  half: true
  dynamic: false
  simplify: true
  opset: null
  nms: false
  int8: false
  workspace: 4

# Output settings
output:
  path: null
  verbose: true

# Verification (optional)
verify:
  enabled: false
  source: null
