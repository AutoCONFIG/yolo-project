# YOLO Training Configuration
# ============================
# Training mode configuration file

# Mode: train, val, predict
mode: train

# Model settings
model:
  # Model to use: yolo26n.pt, yolo26s.pt, yolo26m.pt, yolo26l.pt, yolo26x.pt
  # Or path to custom model: runs/detect/train/weights/best.pt
  name: yolo26n.pt

  # YAML config for building new model from scratch (optional)
  # yaml: yolo26n.yaml

  # Pretrained weights to load when building from yaml (optional)
  # pretrained: yolo26n.pt

# Data settings
data:
  # Dataset config file
  config: coco8.yaml

  # Dataset split for validation (val, test, train)
  split: val

# Training settings
train:
  epochs: 100
  batch: 16        # -1 for auto (60% GPU memory), or fraction like 0.70
  imgsz: 640
  device: null     # null for auto, cpu, 0, 0,1, mps
  workers: 8

  # Resume training from checkpoint
  resume: false

  # Optimizer settings
  optimizer: auto  # SGD, Adam, AdamW, MuSGD, auto
  lr0: 0.01        # Initial learning rate
  lrf: 0.01        # Final learning rate factor
  momentum: 0.937
  weight_decay: 0.0005

  # Warmup settings
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # Learning rate scheduler
  cos_lr: false    # Use cosine LR scheduler

# Augmentation settings
augmentation:
  hsv_h: 0.015     # HSV-Hue augmentation
  hsv_s: 0.7       # HSV-Saturation augmentation
  hsv_v: 0.4       # HSV-Value augmentation
  degrees: 0.0     # Rotation degrees
  translate: 0.1   # Translation
  scale: 0.5       # Scaling
  shear: 0.0       # Shear
  perspective: 0.0 # Perspective
  flipud: 0.0      # Flip up-down probability
  fliplr: 0.5      # Flip left-right probability
  mosaic: 1.0      # Mosaic augmentation probability
  mixup: 0.0       # Mixup augmentation probability
  copy_paste: 0.0  # Copy-paste augmentation probability

  # Advanced augmentation
  erasing: 0.4     # Random erasing probability
  cutmix: 0.0      # CutMix augmentation probability

# Validation settings
validation:
  conf: 0.25       # Confidence threshold
  iou: 0.7         # IoU threshold for NMS

  # Validation during training
  val: true        # Validate during training
  plots: true      # Save plots
  save_json: false # Save results to JSON

# Prediction settings (for predict mode)
predict:
  source: null     # Source: image, video, folder, URL
  conf: 0.25       # Confidence threshold
  iou: 0.7         # IoU threshold for NMS
  max_det: 300     # Maximum detections per image
  save: true       # Save predictions
  save_txt: false  # Save results as txt
  save_conf: false # Save confidence scores
  save_crop: false # Save cropped predictions
  show: false      # Display results
  show_labels: true
  show_conf: true

# Output settings
output:
  project: null    # Project name (default: runs/detect)
  name: null       # Experiment name (default: train, train2, ...)
  save_period: -1  # Save checkpoint every x epochs (-1 for last only)
  exist_ok: false  # Overwrite existing project/name
  verbose: true    # Verbose output
