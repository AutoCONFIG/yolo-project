# YOLO Training Default Configuration
# ====================================
# This is the default config referenced by run_train.sh.
# Copy and modify this file for your own experiments:
#   cp configs/default.yaml configs/train/my_experiment.yaml

mode: train

# Model: .pt filename for pretrained, or .yaml for from-scratch
model:
  name: yolo26n.pt
  pretrained: True
  task: detect

# Data
data:
  config: coco8.yaml
  split: val

# Training
train:
  epochs: 100
  time:
  batch: 16
  imgsz: 640
  device:
  workers: 8
  resume: false
  patience: 100
  cache: false
  save: true
  amp: true
  rect: false
  single_cls: false
  fraction: 1.0
  freeze:
  multi_scale: 0.0
  compile: false
  end2end:
  nbs: 64
  profile: false

  # Optimizer
  optimizer: auto
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  cos_lr: false

  # Warmup
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # Loss gains
  box: 7.5
  cls: 0.5
  cls_pw: 0.0
  dfl: 1.5
  pose: 12.0
  kobj: 1.0
  rle: 1.0
  angle: 1.0

  # Training control
  close_mosaic: 10
  seed: 0
  deterministic: true

  # Task-specific
  dropout: 0.0
  overlap_mask: true
  mask_ratio: 4

# Augmentation
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  bgr: 0.0
  mosaic: 1.0
  mixup: 0.0
  cutmix: 0.0
  copy_paste: 0.0
  copy_paste_mode: flip
  auto_augment: randaugment
  erasing: 0.4

# Validation
validation:
  val: true
  conf:
  iou: 0.7
  max_det: 300
  half: false
  plots: true
  save_json: false
  dnn: false
  agnostic_nms: false
  augment: false

# Misc
cfg:
tracker: botsort.yaml

# Output
output:
  project:
  name:
  save_period: -1
  exist_ok: false
  verbose: true
